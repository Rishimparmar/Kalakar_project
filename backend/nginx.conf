# Nginx Configuration for Kalaakar API Server
# Typically placed at /etc/nginx/sites-available/kalaakar and symlinked to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.mybusiness.in;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.mybusiness.in;

    # SSL Configuration (Let's Encrypt certificates managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.mybusiness.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mybusiness.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Maximum file upload size (Multer handles photo uploads up to this limit)
    client_max_body_size 10M;

    # Serve static uploads directly via Nginx for extreme speed & efficiency
    location /uploads/ {
        alias /var/www/kalaakar/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "https://mybusiness.in" always; # Restrict access to your frontend
    }

    # Proxy API requests to Node/Express (PM2) on port 5000
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Standard proxy headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

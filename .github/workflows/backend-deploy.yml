name: Deploy Backend to Google Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  # ==========================================
  # OPTION A: DEPLOY TO GOOGLE COMPUTE ENGINE (GCE) - ACTIVE DEFAULT
  # ==========================================
  deploy_to_gce:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to GCE VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_VM_IP }}
          username: ${{ secrets.GCE_VM_USER }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Starting GCE Backend deployment..."
            # Navigate to application folder
            cd /var/www/kalaakar
            
            # Fetch latest modifications
            git pull origin main
            
            # Install backend production dependencies
            cd backend
            npm ci --only=production
            
            # Ensure upload folder exists and permissions are correct
            mkdir -p uploads
            chmod 755 uploads
            
            # Reload PM2 application to apply changes without downtime
            pm2 reload ecosystem.config.js --env production
            
            echo "Backend successfully deployed and reloaded with PM2!"

